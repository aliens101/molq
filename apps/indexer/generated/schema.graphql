}

type Query {
  agentIdentity(agentId: BigInt!): agentIdentity
  agentIdentitys(where: agentIdentityFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): agentIdentityPage!
  agent(address: String!): agent
  agents(where: agentFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): agentPage!
  decision(id: String!): decision
  decisions(where: decisionFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): decisionPage!
  vaultEvent(id: String!): vaultEvent
  vaultEvents(where: vaultEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): vaultEventPage!
  vaultAccount(address: String!): vaultAccount
  vaultAccounts(where: vaultAccountFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): vaultAccountPage!
  vaultSnapshot(id: String!): vaultSnapshot
  vaultSnapshots(where: vaultSnapshotFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): vaultSnapshotPage!
  _meta: Meta
}

