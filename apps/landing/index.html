		<script id="structured-data" type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "SoftwareApplication",
				"name": "MolQ",
				"applicationCategory": "FinanceApplication",
				"operatingSystem": "Web",
				"description": "An autonomous USDe yield vault on Mantle with deterministic policy controls and verifiable onchain decisions.",
				"codeRepository": "https://github.com/aliens101/molq",
				"offers": {
					"@type": "Offer",
					"price": "0",
					"priceCurrency": "USD",
					"description": "No deposit or withdrawal fee. A 10% fee applies to realized vault profit."
				}
			}
		</script>
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "FAQPage",
				"mainEntity": [
					{
						"@type": "Question",
						"name": "Where does MolQ yield come from?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "MolQ combines Aave V3 USDe supply yield on Mantle with a policy-capped hedge sleeve designed to capture positive funding carry. Returns are variable and are not guaranteed."
						}
					},
					{
						"@type": "Question",
						"name": "Can the MolQ AI move user funds freely?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "No. The model proposes actions, while deterministic policy checks constrain allocations and execution. Deposits and redemptions are handled by the verified ERC-4626 vault."
						}
					},
					{
						"@type": "Question",
						"name": "Is MolQ audited?",
						"acceptedAnswer": {
							"@type": "Answer",
							"text": "MolQ is open source and its deployed contracts are verified, but it has not completed an independent production audit and should be treated as experimental software."
						}
					}
				]
			}
		</script>
		<script>
			(() => {
				const pageUrl = `${window.location.origin}${window.location.pathname}`;
				const imageUrl = `${window.location.origin}/images/nokeys.png`;
				document.getElementById("canonical-url").href = pageUrl;
				document.getElementById("og-url").content = pageUrl;
				document.getElementById("og-image").content = imageUrl;
				document.getElementById("twitter-image").content = imageUrl;

				const node = document.getElementById("structured-data");
				const data = JSON.parse(node.textContent);
				data.url = pageUrl;
				data.image = imageUrl;
				node.textContent = JSON.stringify(data);
			})();
		</script>
